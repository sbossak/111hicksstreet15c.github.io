<section id="nav-section" class=" text-center">

  <div class="row">
    <div>
      <ul class="list-group list-group-horizontal">
        {% for post in site.posts reversed %}
        <li class="list-group-item">
          <a href="#{{ post.slug }}" class="btn btn-default btn-lg"><i class="fa fa-{{ post.icon }} fa-fw"></i> <span class="network-name">{{ post.title }}</span></a>
        </li>

        {% endfor %}
      </ul>
    </div>
  </div>

</section>
